<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incubator Monitoring System</title>
    <!-- Library Google Fonts & Chart.js -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #fbbf24;
            --danger: #f43f5e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }
        
        h1 { text-align: center; font-family: 'Orbitron', sans-serif; color: var(--primary); margin-bottom: 30px; }

        /* Status Cards */
        .grid-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
        }

        .value { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: var(--accent); }

        /* Kondisi Khusus / Alert */
        #alert-box {
            display: none;
            background: var(--danger);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        /* Control Panel */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 100px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-set { background: var(--primary); color: white; }
        .btn-start { background: #22c55e; color: white; }
        .btn-stop { background: var(--danger); color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Table & Chart */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-container { background: var(--card-bg); padding: 20px; border-radius: 15px; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
        }

        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        th { background: #334155; color: var(--primary); }

        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>INCUBATOR CONTROL CENTER</h1>

    <!-- 5. Kondisi Khusus -->
    <div id="alert-box">PERINGATAN: SUHU DI LUAR BATAS AMAN!</div>

    <div class="grid-header">
        <div class="card">
            <h3>Suhu Sekarang</h3>
            <div id="temp-val" class="value">-- °C</div>
        </div>
        <div class="card">
            <h3>Kelembapan</h3>
            <div id="hum-val" class="value">-- %</div>
        </div>
        <div class="card">
            <h3>Status Alat</h3>
            <p>Kipas: <span id="fan-status">--</span></p>
            <p>Humidifier: <span id="humid-status">--</span></p>
        </div>
    </div>

    <!-- 3 & 4. Setting Interval & Logging -->
    <div class="controls">
        <div>
            <label>Interval Data (ms): </label>
            <input type="number" id="interval-input" placeholder="2000">
            <button class="btn-set" onclick="updateInterval()">SET INTERVAL</button>
        </div>
        <div style="border-left: 1px solid #475569; padding-left: 20px;">
            <span>Logging Status: <b id="log-status-text">--</b></span>
            <button class="btn-start" onclick="setLogging(true)">START</button>
            <button class="btn-stop" onclick="setLogging(false)">STOP</button>
        </div>
    </div>

    <div class="main-grid">
        <!-- 2. Grafik -->
        <div class="chart-container">
            <canvas id="liveChart"></canvas>
        </div>

        <!-- 1. Tabel -->
        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Temp</th>
                        <th>Hum</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data masuk di sini -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Konfigurasi sesuai codingan ESP32 Anda
    const firebaseConfig = {
        databaseURL: "https://penetas-telur-2a65a-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Inisialisasi Chart
    const ctx = document.getElementById('liveChart').getContext('2d');
    const liveChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Suhu (°C)',
                borderColor: '#38bdf8',
                data: [],
                fill: false,
            }, {
                label: 'Kelembapan (%)',
                borderColor: '#fbbf24',
                data: [],
                fill: false,
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: false, grid: { color: '#334155' } } }
        }
    });

    // 1 & 2 & 5. Listen Data Realtime (Monitoring)
    onValue(ref(db, '/Monitoring'), (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const time = new Date().toLocaleTimeString();
            
            // Update UI
            document.getElementById('temp-val').innerText = data.Suhu.toFixed(2) + " °C";
            document.getElementById('hum-val').innerText = data.Kelembapan.toFixed(2) + " %";

            // Kondisi Khusus (Suhu > 39 atau < 35)
            const alertBox = document.getElementById('alert-box');
            if(data.Suhu > 39 || data.Suhu < 35) {
                alertBox.style.display = "block";
            } else {
                alertBox.style.display = "none";
            }

            // Update Tabel (Maksimal 10 data terbaru)
            const tbody = document.querySelector("#data-table tbody");
            const row = tbody.insertRow(0);
            row.insertCell(0).innerText = time;
            row.insertCell(1).innerText = data.Suhu.toFixed(1);
            row.insertCell(2).innerText = data.Kelembapan.toFixed(1);
            if(tbody.rows.length > 10) tbody.deleteRow(10);

            // Update Grafik
            liveChart.data.labels.push(time);
            liveChart.data.datasets[0].data.push(data.Suhu);
            liveChart.data.datasets[1].data.push(data.Kelembapan);
            if(liveChart.data.labels.length > 15) {
                liveChart.data.labels.shift();
                liveChart.data.datasets[0].data.shift();
                liveChart.data.datasets[1].data.shift();
            }
            liveChart.update();
        }
    });

    // Status Relay
    onValue(ref(db, '/Status'), (snapshot) => {
        const status = snapshot.val();
        if(status) {
            document.getElementById('fan-status').innerText = status.Fan ? "ON" : "OFF";
            document.getElementById('humid-status').innerText = status.Humidifier ? "ON" : "OFF";
            document.getElementById('fan-status').style.color = status.Fan ? "#22c55e" : "#f43f5e";
        }
    });

    // Listen Control Status
    onValue(ref(db, '/Control'), (snapshot) => {
        const ctrl = snapshot.val();
        if(ctrl) {
            document.getElementById('log-status-text').innerText = ctrl.Logging ? "ACTIVE" : "PAUSED";
            document.getElementById('log-status-text').style.color = ctrl.Logging ? "#22c55e" : "#f43f5e";
        }
    });

    // 3. Update Interval ke Firebase
    window.updateInterval = () => {
        const val = document.getElementById('interval-input').value;
        if(val >= 500) {
            set(ref(db, '/Control/Interval'), parseInt(val));
            alert("Interval diperbarui ke " + val + "ms");
        } else {
            alert("Minimal interval 500ms");
        }
    }

    // 4. Update Start/Stop Logging
    window.setLogging = (status) => {
        set(ref(db, '/Control/Logging'), status);
    }
</script>

</body>
</html>
